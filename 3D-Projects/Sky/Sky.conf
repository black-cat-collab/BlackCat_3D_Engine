<?xml version='1.0' encoding='UTF-8'?>
<application>
	<!--用户名-->
	<user_name>default</user_name>
	<!--场景文件名-->
	<scene_file>Sky.tw4</scene_file>
	<!--数据目录-->
	<data_dir></data_dir>
	<!--加载的文字类型-->
	<system_font>black_72</system_font>
	<!--SDF加载的文字类型-->
	<system_sdf_font>OPPOSans-M64</system_sdf_font>
	<!--加载的资源文件-->
    <system_script>resource/system.script</system_script>
	<!--是否显示登录窗口-->
	<show_login>false</show_login>
	<!--三维尺寸-->
	<size>
		<!--是否全屏-->
		<full_screen>false</full_screen>
		<!--是否缩放输出-->
		<scale_output_size>false</scale_output_size>
		<!--三维场景宽度-->
		<scene_width>1920</scene_width>
		<!--三维场景高度-->
        <scene_heigth>1078</scene_heigth>
		<!--实际输出宽度-->
		<output_width>1920</output_width>
		<!--实际输出高度-->
        <output_height>1078</output_height>
	</size>
	<!--是否显示调试信息-->
	<show_frame_time>false</show_frame_time>
	<!--是否显示球谐光照球体-->
	<show_irradiance_node>false</show_irradiance_node>
	<!--应用程序名称-->
	<!-- <application_name>TestDemo</application_name> -->
	<!--加载客户端动态库名称-->
	<!-- <client_dll>TestDemo</client_dll> -->
	<!--是否固定帧率-->
	<fixed_FPS update_FPS="30">true</fixed_FPS>
	<!--是否启用后台渲染-->
	<background_render load_FPS="120">false</background_render>
	<!--是否启动休眠-->
	<auto_sleep wait_time="300">false</auto_sleep>
	<!--后台数据服务IP-->
	<!-- <server_ip>http://192.168.30.197:8089</server_ip> -->
	<!--网页地址-->
	<!-- <web_url>http://192.168.30.197:8089/html/dist/index.html</web_url> -->
	<!--相机按键移动速度-->	
	<camera_key_move_speed>3.0</camera_key_move_speed>	
	<!--相机按键旋转速度-->
	<camera_key_rotate_speed>10.0</camera_key_rotate_speed>			
	<!--相机限制区域-->
	<!-- <camera_bound_sphere x="23.721073" y="-1.369315" z="2.0" distance="1000.0"/> -->
	<!--场景时间-->
	<scene_time>15</scene_time>		
	<!--太阳初始偏转角度-->	
	<sun_light_angle>0</sun_light_angle>	
	<!--场景限制高度-->
	<scene_limit_height>0.0</scene_limit_height>
	<!--场景基准高度-->
	<scene_base_height>0.0</scene_base_height>	
	<!--倾斜摄影模型显示最远距离-->
	<paged_node_max_visible>999999</paged_node_max_visible>	
	<!--倾斜摄影模型加载层级最远距离-->
	<paged_node_max_range>999999</paged_node_max_range>	
	<!--倾斜摄影模型加载精度比例 基础比例为1 值越高显示精度越低-->
	<paged_node_range_scale>1.0</paged_node_range_scale>	
	<!--倾斜摄影模型是否接受光照-->
	<paged_node_accept_light>false</paged_node_accept_light>	
	<!--倾斜摄影模型是否接受后处理-->	
	<paged_node_post_process>false</paged_node_post_process>	
	<!--倾斜摄影模型贴图颜色调整 x、y、z为增加值，w为次幂-->
	<!-- <paged_node_tone_color r="0.2" g="0.2" b="0.2" a="2.0"/> -->
	<!--是否动态加载倾斜摄影场景文件-->
	<paged_node_load_scene_dynamic>false</paged_node_load_scene_dynamic>	
	<!--是否动态卸载倾斜摄影场景文件-->
	<paged_node_free_scene_dynamic>false</paged_node_free_scene_dynamic>
	<!--是否深度优先加载倾斜摄影-->
	<paged_node_load_depth_first>true</paged_node_load_depth_first>		
	<!--倾斜摄影池大小-->
	<paged_node_pool_count>10000000</paged_node_pool_count>
	<!--每帧释放倾斜摄影时间/毫秒-->
	<paged_node_release_time_per_frame>2</paged_node_release_time_per_frame>
	<!--瓦片模型是否接受光照-->
	<tiled_node_accept_light>false</tiled_node_accept_light>	
	<!--瓦片模型是否接受后处理-->	
	<tiled_node_post_process>false</tiled_node_post_process>	
	<!--每帧编译时间限制/毫秒-->
	<compile_time_per_frame>10</compile_time_per_frame>	
	<!--每帧释放时间限制/毫秒-->
	<release_time_per_frame>2</release_time_per_frame>
	<!--渲染质量-->
	<render_quality>2</render_quality>	
	<!--Model池初始大小-->
	<model_pool_count>0</model_pool_count>
	<!--阴影模式 0：无阴影 1：1张阴影 2：4张阴影-->
	<dynamic_shadow_type>1</dynamic_shadow_type>	
	<!--多层级阴影数量-->
	<csm_shadow_count>5</csm_shadow_count>
	<!--是否使用固定CSM远近平面-->	
	<csm_shadow_stable_clip>true</csm_shadow_stable_clip>
	<!--多层级阴影加载距离，超过此距离使用一张阴影-->
	<csm_shadow_distance_max>20000.0</csm_shadow_distance_max>	
	<!--动态光源最大值-->
	<dynamic_light_max>2</dynamic_light_max>	
	<!--固定光源最大值-->
	<stationary_light_max>100</stationary_light_max>	
	<!--泛光阈值-->
	<bloom_threshold>0.0</bloom_threshold>	
	<!--泛光强度-->
	<bloom_intensity>1.0</bloom_intensity>	
	<!--十字泛光阈值-->
	<cross_flare_threshold>0.99</cross_flare_threshold>	
	<!--SSAO采样核数量-->
	<ssao_kernel_count>32</ssao_kernel_count>		
	<!--SSAO半径-->
	<ssao_radius>0.5</ssao_radius>
	<!--SSAO强度-->
	<ssao_intensity>0.5</ssao_intensity>	
	<!--是否启用TXAA抗抖动-->
	<txaa_anti_flicker>true</txaa_anti_flicker>
	<!--是否使用LUT色调映射-->
	<use_tone_mapping_lut>true</use_tone_mapping_lut>
	<!--LUT色调映射图片路径-->
	<tone_mapping_lut_file>resource/extra/lut/tonelut.cube</tone_mapping_lut_file>
	<!--是否使用LUT图片-->
	<use_color_grading_lut>false</use_color_grading_lut>
	<!--LUT图片路径-->
	<color_grading_lut_file>resource/extra/lut/Common/.cube</color_grading_lut_file>
	<!--自动曝光-->
	<auto_exposure>false</auto_exposure>
	<!--曝光系数-->
	<exposure_scale>1.0</exposure_scale>
	<!--自动曝光亮度最大阈值-->
	<luminance_threshold_max>10.0</luminance_threshold_max>
	<!--自动曝光亮度最小阈值-->
	<luminance_threshold_min>0.0</luminance_threshold_min>
	<!--天光曝光系数-->
	<sky_exposure_scale>1.0</sky_exposure_scale>
	<!--天光反射强度-->
	<sky_occlusion_intensity>1.0</sky_occlusion_intensity>
	<!--天空颜色-->
	<sky_color r="0.310" g="0.420" b="0.906"/>	
	<!--天空光颜色-->
	<!-- <sky_occlusion_color r="0.327778" g="0.381326" b="0.42869"/>	 -->
	<!--天空遮罩反射地面颜色-->
	<sky_occlusion_ground_color r="0.5" g="0.5" b="0.5"/>
	<!--景深起始距离-->
	<depth_of_filed_start>10000</depth_of_filed_start>
	<!--景深衰减系数-->
	<depth_of_filed_fall_off>0.0001</depth_of_filed_fall_off>
	<!--模糊蒙版-->
	<blur_mask blur="false" radius="0.646" base="0.0" mode="1" left="0.5" right="0.5" top="0.3" bottom="0.0"/>
	<!--蒙版颜色-->
	<mask_color r="0.0" g="0.0" b="0.0" a="0.0"/>		
	<!--场景选中线粗细-->
	<select_line_width>2</select_line_width>
	<!--场景选中模式 0:无选择 1：显示边框线 2：显示Box 3：显示面 4：显示物体-->
	<select_type>1</select_type>	
	<!--场景悬停模式 0:无悬停 1：显示边框线 2：显示Box 3：显示面 4：显示物体-->
	<hover_type>1</hover_type>				
	<!--选中物体的颜色-->
	<select_color r="1.0" g="0.6" b="0.0" a="0.8"/>
	<!--悬停物体颜色-->
	<hover_color r="0.949" g="0.988" b="1.0" a="0.3"/>		
	<!--辉光深度剔除-->
	<glow_depth_enable>false</glow_depth_enable>			
	<!--是否每一帧都更新阴影-->
	<frame_update_shadow>false</frame_update_shadow>	
	<!--色彩滤镜-->
	<color_filter hue="0.0" saturation="0.0" value="0.0" contrast="0.0" brightness="0.0"/>	
	<!--天空图-->
	<!-- <cube_image_six_face>																 -->
		<!-- <str_top>resource/sky/midnight/sky.jpg</str_top> -->
		<!-- <str_front>resource/sky/midnight/sky.jpg</str_front> -->
		<!-- <str_right>resource/sky/midnight/sky.jpg</str_right> -->
		<!-- <str_back>resource/sky/midnight/sky.jpg</str_back> -->
		<!-- <str_left>resource/sky/midnight/sky.jpg</str_left> -->
		<!-- <str_bottom>resource/sky/midnight/sky.jpg</str_bottom> -->
	<!-- </cube_image_six_face> -->
	<!--雾化-->
	<scene_fog_param>
		<!--0 不雾化  1 线性雾化  2 指数雾化-->
		<type>2</type>			
		<!--强度-->
		<intensity>1.0</intensity>	
		<!--基础颜色-->
		<base_color r="0.314" g="0.498" b="1.000"/>	
		<!--起始高度-->
		<height>0.0</height>					
		<!--高度衰减值-->
		<height_fall_off>0.00001</height_fall_off>		
		<!--指数级雾距离衰减-->
		<distance_fall_off>0.00002</distance_fall_off>
		<!--太阳散射率-->
		<light_inscatter>3.0</light_inscatter>	
		<!--起始距离-->
		<start>0</start>
		<!--结束距离-->
		<end>50000</end>				
		<!--是否有光-->
		<light_enable>true</light_enable>	
		<!--是否根据动态天空变化-->
		<dynamic_sky>true</dynamic_sky>	
	</scene_fog_param>
	<shader_config>
		<!--生成PBR光照-->
		<pbr_shader>true</pbr_shader>			
		<!--生成球谐光照-->
		<irradiance_shader>false</irradiance_shader>
		<!--生成动态天空与云-->
		<dynamic_sky_shader>true</dynamic_sky_shader>	
		<!--生成后处理-->
		<post_process_shader>true</post_process_shader>	
		<!--生成延迟渲染-->
		<deffered_shading_shader>true</deffered_shading_shader>	
		<!--生成延迟光照-->
		<deffered_lighting_shader>true</deffered_lighting_shader>	
		<!--时间性抗锯齿-->
		<txaa_shader>true</txaa_shader>						
		<!--生成雾化-->		
		<fog_shader>true</fog_shader>	
		<!--生成泛光-->
		<bloom_shader>true</bloom_shader>	
		<!--生成十字泛光-->
		<cross_flare_shader>false</cross_flare_shader>
		<!--生成辉光-->
		<glow_shader>true</glow_shader>		
		<!--生成太阳体积光-->
		<sun_god_ray_shader>true</sun_god_ray_shader>	
		<!--生成天空反射光-->
		<sky_occlusion_shader>true</sky_occlusion_shader>
		<!--生成透明加权平均-->
		<average_transparent_shader>true</average_transparent_shader>
		<!--生成色调映射-->
		<tone_mapping_shader>true</tone_mapping_shader>
		<!--生成景深-->
		<depth_of_filed_shader>false</depth_of_filed_shader>	
		<!--生成动态阴影-->
		<dynamic_shadow_map_shader>true</dynamic_shadow_map_shader>
		<!--生成屏幕空间阴影-->
		<ss_shadow_map_shader>true</ss_shadow_map_shader>
		<!--生成多层级阴影-->
		<csm_shadow_shader>true</csm_shadow_shader>	
		<!--生成屏幕空间环境光遮蔽-->
		<ssao_shader>true</ssao_shader>	
		<!--生成GroundTruth环境光遮蔽-->
		<gtao_shader>false</gtao_shader>			
		<!--生成模型热力图-->
		<model_heat_map_shader>true</model_heat_map_shader>		
		<!--生成视域分析-->
		<viewshed_analysis_shader>false</viewshed_analysis_shader>	
		<!--生成平面反射-->
		<plane_reflect_shader>false</plane_reflect_shader>		
		<!--生成球面反射-->
		<cube_reflect_shader>false</cube_reflect_shader>		
		<!--生成静态光照贴图-->
		<static_lighting_map_shader>false</static_lighting_map_shader>	
		<!--生成光扩散-->
		<light_spread_shader>true</light_spread_shader>	
		<!--生成视角高光-->
		<view_specular_shader>true</view_specular_shader>		
		<!--快速采样-->
		<fxaa_shader>false</fxaa_shader>					
		<!--生成日光光晕-->
		<sun_lens_flare_shader>true</sun_lens_flare_shader>
		<!--生成屏幕空间反射-->
		<ssr_shader>true</ssr_shader>					
		<!--是否允许使用Box限制光源-->
		<light_box_limit_shader>false</light_box_limit_shader>		
		<!--是否允许遮罩剔除-->
		<occlusion_culling_shader>false</occlusion_culling_shader>	
		<!--动态网格LOD-->
		<dynamic_progressive_mesh>true</dynamic_progressive_mesh>	
		<!--模糊蒙版-->
		<blur_mask_shader>true</blur_mask_shader>	
		<!--颜色转场-->
		<color_transition_shader>true</color_transition_shader>	
		<!--视频融合-->
		<video_fusion_shader>false</video_fusion_shader>
		<!--色彩滤镜-->
		<color_filter_shader>true</color_filter_shader>
		<!--POI-->
        <poi_shader>false</poi_shader>
        <!--距离裁剪-->
        <distance_clip_shader>false</distance_clip_shader>		
	</shader_config>
</application>